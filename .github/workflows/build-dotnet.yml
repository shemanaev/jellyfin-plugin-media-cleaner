name: Build Plugin

on:
  push:
    branches: [ master, main ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ master, main ]
    paths-ignore:
      - '**/*.md'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      jellyfin-matrix: ${{ steps.jellyfin-matrix.outputs.matrix }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Prepare Jellyfin Matrix
        id: jellyfin-matrix
        shell: pwsh
        run: |-
          $matrix = ./eng/get-jellyfin-profiles.ps1 -Format GitHubMatrix
          "matrix=$matrix" >> $env:GITHUB_OUTPUT
      -
        name: Verify Generated Jellyfin Profiles
        shell: pwsh
        run: |-
          ./eng/generate-jellyfin-props.ps1
          git diff --exit-code Directory.JellyfinProfiles.props

  test:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |-
            8.0.x
            9.0.x
      -
        name: Run Unit Tests
        run: dotnet test MediaCleaner.Tests/MediaCleaner.Tests.csproj -c Release

  build:
    runs-on: ubuntu-latest
    needs: [prepare, test]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.jellyfin-matrix) }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      -
        name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |-
            8.0.x
            9.0.x
      -
        name: Prepare Jellyfin Metadata (${{ matrix.jellyfin-profile }})
        shell: pwsh
        run: ./eng/write-build-yaml.ps1 -Profile ${{ matrix.jellyfin-profile }} -OutputPath build.yaml
      -
        name: Build Jellyfin Plugin (${{ matrix.jellyfin-profile }})
        uses: oddstr13/jellyfin-plugin-repository-manager@v1.1.1
        id: jprm
        env:
          JellyfinProfile: ${{ matrix.jellyfin-profile }}
        with:
          output: ./artifacts/${{ matrix.jellyfin-profile }}
          dotnet-config: Release
          dotnet-target: ${{ matrix.dotnet-target }}
      -
        name: Normalize Artifact Name (${{ matrix.jellyfin-profile }})
        run: cp "${{ steps.jprm.outputs.artifact }}" "artifacts/${{ matrix.jellyfin-profile }}/MediaCleaner-${{ matrix.jellyfin-profile }}.zip"
      -
        name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ matrix.jellyfin-profile }}
          retention-days: 30
          if-no-files-found: error
          path: artifacts/${{ matrix.jellyfin-profile }}/MediaCleaner-${{ matrix.jellyfin-profile }}.zip
